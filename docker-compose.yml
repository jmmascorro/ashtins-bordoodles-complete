version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: bordoodles-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bordoodles
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  api:
    build: ./bordoodles-api
    container_name: bordoodles-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: bordoodles
      DB_PORT: 3306
    volumes:
      - ./bordoodles-api/uploads:/usr/src/app/uploads
    networks:
      - app-network

  # Public Website (Frontend)
  site:
    build: ./bordoodles-site
    container_name: bordoodles-site
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - app-network

  # CMS Admin Panel (Frontend)
  cms:
    build: ./bordoodles-cms
    container_name: bordoodles-cms
    restart: always
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - app-network

  # Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: bordoodles-tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
